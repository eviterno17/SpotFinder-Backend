# =========================
# SERVER
# =========================
server.port=${PORT:8080}
server.address=0.0.0.0
spring.application.name=spotFinder-backend

# =========================
# BASE DE DATOS
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# DOCUMENTACIÓN 
# =========================
documentation.application.description=SpotFinder Backend API
documentation.application.version=1.0.0

# =========================
# JWT
# =========================
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=7

# =========================
# CORS
# =========================
spring.graphql.cors.allowed-origins=${CORS_ORIGINS}
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.graphql.cors.allowed-headers=Origin,Accept,X-Requested-With,Content-Type,Authorization,Access-Control-Request-Method,Access-Control-Request-Headers
spring.graphql.cors.allow-credentials=true
