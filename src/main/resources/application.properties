server.port=8080
server.address=0.0.0.0
spring.profiles.active=test
spring.application.name=spotFinder-backend

# Spring Data JPA Configuration
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/spotFinder?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.hibernate.naming.physical-strategy=com.spotfinderbackend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
# Application Information for Documentation

# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret = WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days = 7

# CORS Configuration
spring.graphql.cors.allowed-origins=https://front-opensource.web.app
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.graphql.cors.allowed-headers=Origin,Accept,X-Requested-With,Content-Type,Authorization,Access-Control-Request-Method,Access-Control-Request-Headers
spring.graphql.cors.allow-credentials=true

# Parking fee / payment defaults
spotfinder.parking.rate-per-hour=5.00

# Emergency thresholds (PPM)
spotfinder.emergency.gas-threshold-ppm=900

# Report generation
spotfinder.reports.storage-path=./reports

# Culqi (override in environment)
culqi.public-key=
culqi.private-key=
culqi.api-url=https://api.culqi.com/v2

# Plate Recognizer (override in environment)
platerecognizer.api-url=https://api.platerecognizer.com/v1/plate-reader/
platerecognizer.api-token=

# Firebase Cloud Messaging (override in environment)
firebase.service-account-path=

# Allow large file uploads (ALPR base64 images can be sizeable)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
