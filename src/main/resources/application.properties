server.port=${PORT}
server.address=0.0.0.0

spring.application.name=spotFinder-backend
documentation.application.description=SpotFinder Backend API
documentation.application.version=1.0.0
# =========================
# DATABASE (PRODUCTION)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# SSL / CONNECTION SAFETY
# =========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.initialization-fail-timeout=60000

# =========================
# JWT
# =========================
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=7

# =========================
# CORS
# =========================
spring.graphql.cors.allowed-origins=https://front-opensource.web.app
spring.graphql.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true
